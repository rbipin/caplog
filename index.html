<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CapLog</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/app.ts" defer></script>
  </head>
  <body>
    <div class="app" id="app">

      <!-- Header -->
      <header class="header">
        <button class="sidebar-toggle" id="sidebarToggleBtn" title="Toggle log history">☰</button>
        <div class="header-logo">CapLog</div>
        <div class="header-date" id="headerDate"></div>
        <div class="header-actions">
          <button class="btn-ghost" id="viewLogBtn">⊞ View Log</button>
          <button class="btn-ghost" id="exportBtn">↗ Export .md</button>
          <button class="btn-ghost" id="settingsBtn">⚙ Settings</button>
        </div>
      </header>

      <!-- Left sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-section-title" id="sidebarMonthLabel"></div>
          <button class="btn-ghost sidebar-archive-btn" id="archiveBtn">⊞ Archive</button>
        </div>
        <div id="dayList"></div>
      </aside>

      <!-- Main chat -->
      <main class="main">
        <div class="chat-area" id="chatArea"></div>

        <!-- Input area -->
        <div class="input-area">
          <div class="input-hint">
            Just type to log · <span>/todo</span> new task · <span>/done</span> complete · <span>/important</span> prioritize · <span>/by [date]</span> set deadline
          </div>
          <div class="input-row">
            <textarea class="chat-input" placeholder="What did you work on today..." rows="1" id="chatInput"></textarea>
            <button class="send-btn" id="sendBtn">↑</button>
          </div>
        </div>
      </main>

      <!-- Todo panel -->
      <aside class="todo-panel">
        <div class="todo-header">
          <div class="todo-title">Active Todos</div>
          <div class="todo-count" id="todoCount"></div>
        </div>
        <div class="todo-list" id="todoList"></div>
      </aside>

    </div>

    <!-- Log View Modal -->
    <div class="modal-overlay" id="logModal">
      <div class="modal">
        <div class="modal-header">
          <div>
            <div class="modal-title">CapLog</div>
            <div class="modal-subtitle" id="modalSubtitle"></div>
          </div>
          <button class="modal-close" id="modalCloseBtn">✕</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-footer">
          <button class="btn-ghost" id="modalExportBtn">↗ Export .md</button>
          <button class="btn-ghost" id="modalFooterCloseBtn">Close</button>
        </div>
      </div>
    </div>
    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
      <div class="modal">
        <div class="modal-header">
          <div>
            <div class="modal-title">Settings</div>
          </div>
          <button class="modal-close" id="settingsCloseBtn">✕</button>
        </div>
        <div class="modal-body settings-body">
          <label class="settings-label">Provider</label>
          <select id="llmProviderSelect" class="settings-select">
            <option value="anthropic">Anthropic</option>
            <option value="openai">OpenAI-compatible</option>
          </select>

          <label class="settings-label">API Key</label>
          <input
            type="password"
            id="apiKeyInput"
            class="settings-input"
            placeholder="sk-..."
          />

          <label class="settings-label">Model</label>
          <input
            type="text"
            id="llmModelInput"
            class="settings-input"
            placeholder="claude-haiku-4-5-20251001"
          />

          <div id="baseUrlGroup">
            <label class="settings-label">Base URL</label>
            <input
              type="text"
              id="llmBaseUrlInput"
              class="settings-input"
              placeholder="https://api.openai.com"
            />
            <p class="settings-hint">For Ollama use http://localhost:11434</p>
          </div>

          <label class="settings-label">Days to show in chat</label>
          <input type="number" id="chatDaysInput" class="settings-input" min="1" max="14" placeholder="3" />

          <p class="settings-hint">Used for AI log formatting. Stored locally, never sent anywhere else.</p>
          <button id="saveSettingsBtn" class="settings-save-btn">Save</button>
        </div>
      </div>
    </div>
    <!-- Archive Modal -->
    <div class="archive-overlay" id="archiveModal">
      <div class="archive-header">
        <span class="archive-title">Archive</span>
        <input class="archive-search" id="archiveSearchInput" placeholder="Search entries..." />
        <div class="archive-year-nav">
          <button class="btn-ghost" id="archiveYearPrev">◀</button>
          <span class="archive-year-label" id="archiveYearLabel"></span>
          <button class="btn-ghost" id="archiveYearNext">▶</button>
        </div>
        <button class="modal-close" id="archiveCloseBtn">✕</button>
      </div>
      <div class="archive-body" id="archiveBody"></div>
    </div>
  </body>
</html>
